name: Sync specs submodule

permissions:
  contents: write
  pull-requests: write

on:
  repository_dispatch:
    types: [s2-specs-update]

jobs:
  sync-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Update submodule
        id: submodules
        uses: sgoudham/update-git-submodules@85ea2b33c7a1e8ac4746d0726c74f26d01c46816 # v2.1.3
        with:
          submodules: api/specs

      - name: Create pull request
        if: ${{ steps.submodules.outputs['api/specs--updated'] }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          committer: s2-helper[bot] <194906454+s2-helper[bot]@users.noreply.github.com>
          author: s2-helper[bot] <194906454+s2-helper[bot]@users.noreply.github.com>
          sign-commits: true
          title: "chore: sync specs submodule"
          branch: "specs/sync-${{ steps.submodules.outputs['api/specs--latestShortCommitSha'] }}"
          body: ${{ steps.submodules.outputs.prBody }}
