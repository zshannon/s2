name: Release Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/helm-release.yml'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Push to gh-pages and create releases
      packages: write  # Push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_GENERATE_RELEASE_NOTES: "true"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          packages=(.cr-release-packages/*.tgz)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "No packages from chart-releaser, packaging charts directly..."
            # NOTE: assumes a single chart (s2-lite-helm). If more charts are added, filter to only changed ones.
            for chart in charts/*/; do
              helm package "$chart" -d .cr-release-packages/
            done
            packages=(.cr-release-packages/*.tgz)
          fi
          for pkg in "${packages[@]}"; do
            echo "Pushing $pkg to GHCR"
            helm push "${pkg}" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
